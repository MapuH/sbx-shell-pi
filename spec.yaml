schemaVersion: "1"
kind: agent
name: pi
displayName: Pi
description: Minimal terminal coding harness

agent:
  image: "docker/sandbox-templates:shell-docker"
  persistence: persistent
  # entrypoint:
    # run: [pi]

network:
  serviceDomains:
    pi.dev: pi
    opencode.ai: opencode
    # chatgpt.com: openai
  allowedDomains:
    - "pi.dev:443"
    - "opencode.ai:443"
    # - "chatgpt.com:443"

# credentials:
#    sources:
#        openai:
#            env:
#                - OPENAI_API_KEY

environment:
    variables:
        OPENCODE_API_KEY: sk-opencode
        GITLAB_TOKEN: glpat-secret
#    proxyManaged:
#        - OPENAI_API_KEY

commands:
  install:
    - command: "apt-get update && apt-get install -y curl ca-certificates gnupg python3 python3-venv python3-pip python3-dev build-essential git pkg-config nano"
    - command: |
        curl -sSL "https://raw.githubusercontent.com/upciti/wakemeops/main/assets/install_repository" | sudo bash
    - command: "sudo apt install glab"
    - command: |
        curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="/usr/local/bin" UV_NO_MODIFY_PATH="1" sh
      description: Install uv
    - command: "curl -fsSL https://pi.dev/install.sh | sh"
      user: "1000"
      description: Install Pi
    - command: |
        printf "\nexport TERM=xterm-256color\n" >> ~/.bashrc && \
        printf "\n# Enable color support for ls and grep\nalias ls='ls --color=auto'\nalias grep='grep --color=auto'\nalias ll='ls -alF'\nalias la='ls -A'\nalias l='ls -CF'\n" >> ~/.bashrc && \
        printf "\n# A more interesting colorful prompt\nPS1='\\[\\033[38;5;135m\\]\\u\\[\\033[0m\\]@\\[\\033[38;5;166m\\]\\h\\[\\033[0m\\]:\\[\\033[38;5;118m\\]\\W\\[\\033[0m\\]\\$ '\n" >> ~/.bashrc
      user: "1000"
      description: Configure terminal with colors and a nice prompt